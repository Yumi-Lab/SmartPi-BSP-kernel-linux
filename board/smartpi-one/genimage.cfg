image boot.vfat {
	vfat {
		extraargs = "-F 32 -n BOOT"
		files = {
			"zImage",
			"sun8i-h3-nanopi-m1.dtb"
		}
	}
	size = 64M
}

image rootfs.ext4 {
	ext4 {
		label = "rootfs"
		use-mke2fs = "true"
	}
	size = 256M
	mountpoint = "/"
}

image sdcard.img {
	hdimage {
		align = "1M"
	}

	partition spl {
		in-partition-table = "no"
		image = "u-boot-sunxi-with-spl.bin"
		offset = 8192
	}

	partition boot {
		partition-type = 0xC
		bootable = "true"
		image = "boot.vfat"
	}

	partition rootfs {
		partition-type = 0x83
		image = "rootfs.ext4"
	}
}
